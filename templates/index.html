<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Krishna - Sacred Guidance</title>
    <!-- Classical typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <!-- Sidebar / Chat History -->
    <div id="history-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Your Journey</h3>
            <button id="close-sidebar" class="icon-btn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
        </div>
        <div class="sidebar-content" id="history-list">
            <!-- History items will be injected here -->
            <div class="empty-history">Your spiritual journey awaits...</div>
        </div>
    </div>

    <!-- Ambient particle background -->
    <canvas id="particles-canvas"></canvas>
    <div class="texture-overlay"></div>

    <!-- Landing View -->
    <div id="landing-view" class="view-container active">
        <main class="landing-content">

            <h1 class="hero-title fade-in-up">What troubles you, dear soul?</h1>
            <div class="fade-in-up delay-1" style="margin-top: 2rem;">
                <button type="button" class="btn-primary" id="btn-begin-journey">
                    <span class="btn-text">Begin Your Journey</span>
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
        </main>
    </div>

    <!-- Chat View -->
    <div id="chat-view" class="view-container hidden">
        <header class="chat-header">
            <div class="header-logo" onclick="window.location.reload()">
                <svg class="peacock-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Abstract peacock feather icon -->
                    <path
                        d="M12 22C12 22 17 18 19 14C20.6 10.8 19 8 16 6C13.5 4.3 12 2 12 2C12 2 10.5 4.3 8 6C5 8 3.4 10.8 5 14C7 18 12 22 12 22Z"
                        fill="url(#paint0_linear)" />
                    <circle cx="12" cy="11" r="3" fill="#1A6B72" />
                    <circle cx="12" cy="11" r="1.5" fill="#E8A020" />
                    <defs>
                        <linearGradient id="paint0_linear" x1="12" y1="2" x2="12" y2="22"
                            gradientUnits="userSpaceOnUse">
                            <stop stop-color="#1A6B72" />
                            <stop offset="1" stop-color="#0c3236" />
                        </linearGradient>
                    </defs>
                </svg>
                <span>Ask Krishna</span>
            </div>
            <div class="right-action">
                <button class="text-btn" id="btn-logout" style="margin-right: 10px;">Logout</button>
                <button class="text-btn open-daily-verse-btn">✦ Daily Verse</button>
            </div>
        </header>

        <div id="chat-container">
            <div id="chat-history">
                <!-- Chat messages will be dynamically injected here -->
            </div>

            <div class="chat-input-area">
                <form id="chat-form">
                    <div class="input-wrapper chat-input-wrapper">
                        <textarea id="chat-input" placeholder="Continue your journey..." rows="1" required></textarea>
                        <button type="submit" class="btn-send" id="btn-send">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Daily Verse Modal -->
    <div id="verse-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="close-modal" class="icon-btn close-modal-btn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <div class="daily-verse-widget expanded">
                <div class="widget-label">✦ Verse of the Day ✦</div>
                <div class="widget-sanskrit" id="daily-sanskrit"></div>
                <div class="widget-english" id="daily-english"></div>
                <div class="widget-ref"></div>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal-overlay">
        <div class="modal-content auth-content">
            <button id="close-auth-modal" class="icon-btn close-modal-btn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <div class="auth-widget">
                <div class="widget-label">✦ Enter the Sanctuary ✦</div>
                <h2 class="auth-title">Welcome Seekers</h2>
                <div class="auth-tabs">
                    <button class="auth-tab active" id="tab-login">Login</button>
                    <button class="auth-tab" id="tab-signup">Sign Up</button>
                </div>

                <form id="auth-form" class="auth-form">
                    <input type="email" id="auth-email" placeholder="Your Email" required class="auth-input">
                    <input type="password" id="auth-password" placeholder="Password" required class="auth-input">
                    <div id="auth-error" class="auth-error hidden"></div>
                    <button type="submit" class="btn-primary auth-submit" id="btn-auth-submit">
                        <span class="btn-text">Log In</span>
                    </button>
                </form>

                <div class="auth-divider"><span>or</span></div>

                <button id="btn-google-auth" class="btn-secondary google-btn" type="button">
                    <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Continue with Google
                </button>
            </div>
        </div>
    </div>

    <!-- Name Collection Modal -->
    <div id="name-modal" class="modal-overlay">
        <div class="modal-content auth-content">
            <div class="auth-widget">
                <div class="widget-label">✦ A New Soul ✦</div>
                <h2 class="auth-title">How shall Krishna address you?</h2>
                <form id="name-form" class="auth-form">
                    <input type="text" id="user-first-name" placeholder="Your First Name" required class="auth-input">
                    <button type="submit" class="btn-primary auth-submit">
                        <span class="btn-text">Continue</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Template for Verse Cards (hidden, used by JS) -->
    <template id="verse-card-template">
        <div class="verse-card">
            <div class="verse-badge">Bhagavad Gita — Chapter <span class="ch"></span>, Verse <span class="vs"></span>
            </div>
            <div class="verse-sanskrit"></div>
            <div class="verse-english"></div>
        </div>
    </template>

    <script src="/static/script.js"></script>
</body>

</html>
